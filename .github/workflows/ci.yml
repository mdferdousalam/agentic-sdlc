name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-json:
    name: Validate JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Parse JSON manifests
        run: |
          for f in .claude-plugin/plugin.json .claude-plugin/marketplace.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8')); console.log('ok: ' + '$f')"
          done

  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: markdownlint
        run: npx --yes markdownlint-cli2

  validate-plugin:
    name: Validate plugin structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Validate plugin manifest, agents, and skills
        run: node .github/scripts/validate-plugin.mjs
